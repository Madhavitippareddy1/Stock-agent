services:
  app:
    build: .
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: stock_agent
      POSTGRES_USER: stock_agent
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
