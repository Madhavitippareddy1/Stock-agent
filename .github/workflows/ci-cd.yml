name: CI/CD

on:
  push:
    branches: [main, Madhavi]
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: dev-dsmay-stock-agent-repo
  ECS_CLUSTER: dev-dsmay-stock-agent-cluster
  ECS_SERVICE: dev-dsmay-stock-agent-ecs
  ECS_TASK_DEFINITION: infra/ecs-task-definition.json

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run pytest --cov=stock_agent --cov-report=term-missing
      - run: docker build -t stock-agent:test .

  build-and-deploy:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.AWS_DEPLOY_ENABLED == 'true'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment configuration
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_SERVICE: ${{ env.ECS_SERVICE }}
        run: |
          for name in AWS_ROLE_ARN AWS_REGION ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE; do
            test -n "${!name}" || { echo "::error::Missing $name"; exit 1; }
          done
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push Docker image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: task
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: stock-agent
          image: ${{ steps.image.outputs.uri }}
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  notify-failure:
    if: >-
      always() &&
      github.event_name == 'push' &&
      vars.CICD_EMAIL_NOTIFICATIONS_ENABLED == 'true' &&
      (needs.test.result == 'failure' || needs['build-and-deploy'].result == 'failure')
    needs: [test, build-and-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Validate notification configuration
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          SNS_TOPIC_ARN: ${{ secrets.CICD_SNS_TOPIC_ARN }}
        run: |
          test -n "$AWS_ROLE_ARN" || { echo "::error::Missing AWS_ROLE_ARN"; exit 1; }
          test -n "$SNS_TOPIC_ARN" || { echo "::error::Missing CICD_SNS_TOPIC_ARN"; exit 1; }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Send CI/CD failure email
        env:
          SNS_TOPIC_ARN: ${{ secrets.CICD_SNS_TOPIC_ARN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          SUBJECT="Stock Agent CI/CD failed: $BRANCH"
          MESSAGE="Repository: $REPOSITORY
Branch: $BRANCH
Workflow: $WORKFLOW
Commit: $COMMIT_SHA
Triggered by: $ACTOR
Run details: $RUN_URL"

          aws sns publish \
            --topic-arn "$SNS_TOPIC_ARN" \
            --subject "$SUBJECT" \
            --message "$MESSAGE"
